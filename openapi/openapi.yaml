openapi: 3.1.0
info:
  title: User Service
  version: 1.0.0
tags:
  - name: Users
  - name: FCM Tokens
paths:
  /v1/fcmTokens:
    get:
      operationId: FCMTokenV1_list
      description: FCMトークンの一覧を取得する
      parameters:
        - name: userIds
          in: query
          required: false
          description: ユーザーIDの一覧
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: tokens
          in: query
          required: false
          description: FCMトークンの一覧
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: updatedAtFrom
          in: query
          required: false
          description: 更新日時の開始日時 (updatedAt >= updatedAtFrom)
          schema:
            type: string
            format: date-time
        - name: updatedAtTo
          in: query
          required: false
          description: 更新日時の終了日時 (updatedAt <= updatedAtTo)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: FCMトークンの一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  fcmTokens:
                    type: array
                    items:
                      $ref: '#/components/schemas/FCMToken'
                required:
                  - fcmTokens
      tags:
        - FCM Tokens
    post:
      operationId: FCMTokenV1_upsert
      description: |-
        FCMトークンを作成または更新する
        存在しない場合は作成し、存在する場合は更新日時を更新する
      parameters: []
      responses:
        '200':
          description: 作成または更新されたFCMトークン
          content:
            application/json:
              schema:
                type: object
                properties:
                  fcmToken:
                    $ref: '#/components/schemas/FCMToken'
                required:
                  - fcmToken
      tags:
        - FCM Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FCMTokenRequest'
        description: 作成または更新するFCMトークンの情報
  /v1/users:
    get:
      operationId: UsersV1_list
      description: ユーザーの一覧を取得する
      parameters: []
      responses:
        '200':
          description: ユーザーの一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                required:
                  - users
      tags:
        - Users
  /v1/users/{id}:
    get:
      operationId: UsersV1_detail
      description: ユーザーを取得する
      parameters:
        - name: id
          in: path
          required: true
          description: ユーザーID
          schema:
            type: string
      responses:
        '200':
          description: ユーザーの情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                required:
                  - user
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Users
    post:
      operationId: UsersV1_upsert
      description: ユーザーを作成または更新する
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 作成または更新されたユーザー
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                required:
                  - user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
        description: 作成または更新するユーザーの情報
components:
  schemas:
    DottoFoundationV1.Class:
      type: string
      enum:
        - A
        - B
        - C
        - D
        - E
        - F
        - G
        - H
        - I
        - J
        - K
        - L
      description: クラス
    DottoFoundationV1.Course:
      type: string
      enum:
        - InformationSystem
        - InformationDesign
        - AdvancedICT
        - ComplexSystem
        - IntelligentSystem
      description: コース
    DottoFoundationV1.Grade:
      type: string
      enum:
        - B1
        - B2
        - B3
        - B4
        - M1
        - M2
        - D1
        - D2
        - D3
      description: 学年
    FCMToken:
      type: object
      required:
        - token
        - userId
        - createdAt
        - updatedAt
      properties:
        token:
          type: string
          description: FCMトークン
        userId:
          type: string
          description: ユーザーID
        createdAt:
          type: string
          format: date-time
          description: 作成日時
        updatedAt:
          type: string
          format: date-time
          description: 更新日時
    FCMTokenRequest:
      type: object
      required:
        - userId
        - token
      properties:
        userId:
          type: string
        token:
          type: string
    User:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: string
          description: |-
            ユーザーID

            Firebase Authentication の UID
        email:
          type: string
          description: |-
            メールアドレス

            Firebase Authentication のメールアドレス
        grade:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.Grade'
          description: 学年
        course:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.Course'
          description: コース
        class:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.Class'
          description: クラス
    UserRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
        grade:
          $ref: '#/components/schemas/DottoFoundationV1.Grade'
        course:
          $ref: '#/components/schemas/DottoFoundationV1.Course'
        class:
          $ref: '#/components/schemas/DottoFoundationV1.Class'
servers:
  - url: http://localhost:8080
    description: Local
    variables: {}
  - url: https://user-api-dev-107577467292.asia-northeast1.run.app
    description: Development
    variables: {}
  - url: https://user-api-stg-107577467292.asia-northeast1.run.app
    description: Staging
    variables: {}
  - url: https://user-api-qa-107577467292.asia-northeast1.run.app
    description: QA
    variables: {}
  - url: https://user-api-107577467292.asia-northeast1.run.app
    description: Production
    variables: {}
